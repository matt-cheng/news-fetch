<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daily Digest">
<meta name="theme-color" content="#faf9f6" id="theme-color-meta">
<title>Daily Digest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --bg:#faf9f6;--surface:#fff;--surface2:#f0eeeb;--border:#ebebeb;
  --text:#111;--text2:#444;--muted:#888;--faint:#ccc;
  --search-bg:#f0eeea;--skeleton:#efefef;--header-bg:rgba(250,249,246,.95);
  --radius:14px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
[data-theme="dark"]{
  --bg:#131313;--surface:#1e1e1e;--surface2:#252525;--border:#2e2e2e;
  --text:#f0f0f0;--text2:#bbb;--muted:#777;--faint:#444;
  --search-bg:#252525;--skeleton:#2a2a2a;--header-bg:rgba(19,19,19,.95);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);transition:background .2s,color .2s}

/* Header */
.header{position:sticky;top:0;z-index:100;background:var(--header-bg);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 14px) 20px 0;transition:background .2s,border-color .2s}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:10px;max-width:680px;margin:0 auto;padding-bottom:12px}
.header-left h1{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;line-height:1;color:var(--text);transition:color .2s}
.header-left .date{font-size:12px;color:var(--muted);margin-top:3px}
.header-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.icon-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:15px;line-height:1;transition:background .15s,border-color .2s;flex-shrink:0}
.icon-btn:active{background:var(--surface2)}
.icon-btn.active-btn{background:var(--surface2);border-color:var(--muted)}
.refresh-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text);cursor:pointer;flex-shrink:0;transition:background .15s,border-color .2s,color .2s}
.refresh-btn:active{background:var(--surface2)}
.refresh-btn.loading{color:var(--muted)}

/* Search */
.search-bar{max-width:680px;margin:0 auto;padding:0 0 12px;display:none}
.search-bar.open{display:block}
.search-inner{display:flex;align-items:center;gap:8px;background:var(--search-bg);border-radius:12px;padding:9px 14px;transition:background .2s}
.search-input{flex:1;background:none;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);min-width:0}
.search-input::placeholder{color:var(--faint)}
.search-clear{font-size:18px;color:var(--faint);cursor:pointer;line-height:1;visibility:hidden}
.search-clear.show{visibility:visible}

/* Topics bar */
.topics-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:12px 20px;transition:background .2s,border-color .2s}
.topics-bar-inner{max-width:680px;margin:0 auto}
.topics-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:9px}
.topics-scroll{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.topic-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:12.5px;font-weight:500;cursor:pointer;border:1px solid transparent;user-select:none;-webkit-user-select:none}
.topic-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.topic-remove{font-size:14px;opacity:.4;margin-left:1px}
.add-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:12.5px;border:1px dashed var(--faint);color:var(--muted);background:transparent;cursor:pointer}
.add-input-wrap{display:inline-flex;align-items:center;gap:6px}
.add-input-wrap input{font-size:13px;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;outline:none;width:130px}
.add-input-wrap button{font-size:12px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif}

/* Feed */
.feed{max-width:680px;margin:0 auto;padding:20px 20px calc(var(--safe-bottom) + 80px)}
.topic-section{margin-bottom:28px}
.topic-section.hidden{display:none}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.section-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.section-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.section-line{flex:1;height:1px;background:var(--border)}

/* Cards */
.story-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:9px;text-decoration:none;display:block;color:inherit;transition:border-color .15s,transform .1s,background .2s;-webkit-touch-callout:none}
.story-card:active{transform:scale(.99);border-color:var(--faint)}
.story-card.hidden{display:none}
.story-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
.story-headline{font-size:14px;font-weight:500;color:var(--text);line-height:1.45;flex:1}
.story-tag{font-size:10px;font-weight:600;letter-spacing:.03em;padding:3px 8px;border-radius:7px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.story-summary{font-size:12.5px;color:var(--text2);line-height:1.6;margin-bottom:8px}
.story-meta{font-size:11px;color:var(--faint);display:flex;align-items:center;gap:5px}
.story-meta-arrow{margin-left:auto;font-size:11px}
mark{background:#ffe566;color:#111;border-radius:2px;padding:0 1px}
[data-theme="dark"] mark{background:#7a5e00;color:#ffe599}

/* Skeleton */
.skeleton{background:var(--skeleton);border-radius:6px;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.skeleton-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:9px}
.no-stories{font-size:13px;color:var(--faint);padding:8px 0 4px}
.error-note{font-size:11px;color:var(--muted);padding:4px 0 2px;font-style:italic}

/* Search info */
.search-info{font-size:12px;color:var(--muted);margin-bottom:4px;padding-top:4px;min-height:24px}
.no-results{display:none;text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
.no-results.show{display:block}
.no-results-icon{font-size:32px;margin-bottom:10px}

/* Install banner */
.install-banner{margin:0 0 20px;background:#fff8ee;border:1px solid #f5d78e;border-radius:var(--radius);padding:13px 16px;font-size:13px;color:#7a5000;line-height:1.5;display:flex;align-items:flex-start;gap:10px}
[data-theme="dark"] .install-banner{background:#2a1f00;border-color:#6a5000;color:#f0c060}
.install-banner-close{margin-left:auto;cursor:pointer;opacity:.5;font-size:18px;line-height:1;flex-shrink:0}

/* Spinner */
.spin{display:inline-block;width:12px;height:12px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--muted);animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Sources Drawer ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;bottom:0;left:0;right:0;z-index:201;background:var(--surface);border-radius:20px 20px 0 0;padding:0 0 calc(var(--safe-bottom) + 16px);max-height:82vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
.drawer.open{transform:translateY(0)}
.drawer-handle{width:36px;height:4px;background:var(--faint);border-radius:2px;margin:12px auto 0}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;flex-shrink:0;border-bottom:1px solid var(--border)}
.drawer-title{font-size:16px;font-weight:600;color:var(--text)}
.drawer-close{font-size:22px;color:var(--muted);cursor:pointer;line-height:1;padding:0 4px}
.drawer-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 20px}
.source-category{margin-bottom:22px}
.source-cat-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:10px}
.source-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.source-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:border-color .15s,background .15s;user-select:none;-webkit-user-select:none}
.source-card.on{border-color:transparent}
.source-card:active{background:var(--surface2)}
.source-logo{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;letter-spacing:-.5px}
.source-info{min-width:0}
.source-name{font-size:12.5px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.source-cat{font-size:10.5px;color:var(--muted)}
.source-check{margin-left:auto;width:18px;height:18px;border-radius:50%;border:1.5px solid var(--faint);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:background .15s,border-color .15s}
.source-card.on .source-check{background:#111;border-color:#111;color:#fff}
[data-theme="dark"] .source-card.on .source-check{background:#f0f0f0;border-color:#f0f0f0;color:#111}
.drawer-apply{margin:12px 20px 0;padding:13px;border-radius:12px;background:#111;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;border:none;cursor:pointer;width:calc(100% - 40px);transition:opacity .15s}
[data-theme="dark"] .drawer-apply{background:#f0f0f0;color:#111}
.drawer-apply:active{opacity:.8}
.sources-badge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:#111;color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1}
[data-theme="dark"] .sources-badge{background:#f0f0f0;color:#111}
.icon-btn-wrap{position:relative}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-left">
      <h1>Daily Digest</h1>
      <div class="date" id="date-label"></div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="search-btn" aria-label="Search">🔍</button>
      <div class="icon-btn-wrap">
        <button class="icon-btn" id="sources-btn" aria-label="Sources">📰</button>
        <span class="sources-badge" id="sources-badge" style="display:none"></span>
      </div>
      <button class="icon-btn" id="dark-btn" aria-label="Toggle dark mode">🌙</button>
      <button class="refresh-btn" id="refresh-btn"><span id="refresh-icon">↻</span> Refresh</button>
    </div>
  </div>
  <div class="search-bar" id="search-bar">
    <div class="search-inner">
      <span style="color:var(--muted);font-size:15px;flex-shrink:0">🔍</span>
      <input class="search-input" id="search-input" type="search" placeholder="Search headlines…" autocomplete="off" autocorrect="off" spellcheck="false">
      <span class="search-clear" id="search-clear">×</span>
    </div>
  </div>
</div>

<div class="topics-bar">
  <div class="topics-bar-inner">
    <div class="topics-label">Your topics</div>
    <div class="topics-scroll" id="topics-row"></div>
  </div>
</div>

<div class="feed">
  <div id="install-hint"></div>
  <div class="search-info" id="search-info"></div>
  <div class="no-results" id="no-results"><div class="no-results-icon">🔍</div><div id="no-results-msg"></div></div>
  <div id="stories-container"></div>
</div>

<!-- Sources Drawer -->
<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <div class="drawer-title">News Sources</div>
    <span class="drawer-close" id="drawer-close">×</span>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
  <button class="drawer-apply" id="drawer-apply">Apply & Refresh</button>
</div>

<script>
const KEY_TOPICS  = 'digest-topics-v2';
const KEY_BANNER  = 'digest-banner-dismissed';
const KEY_THEME   = 'digest-theme-v1';
const KEY_SOURCES = 'digest-sources-v1';

// CORS proxies — tried in order
const PROXIES = [
  u=>`https://api.allorigins.win/get?disableCache=true&url=${encodeURIComponent(u)}`,
  u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
];

// ── Source catalogue ────────────────────────────────────────────────────────
// Each source: id, name, logo text, logo bg color, category tags it suits, rss url
const ALL_SOURCES = [
  // General / World
  {id:'bbc',       name:'BBC News',      logo:'BBC',  bg:'#BB1919',tc:'#fff', cats:['World News','Politics','Health','Science','Business','Sports','Entertainment','Climate'], url:'https://feeds.bbci.co.uk/news/rss.xml'},
  {id:'npr',       name:'NPR',           logo:'NPR',  bg:'#3E85C6',tc:'#fff', cats:['World News','Politics','Health','Science','Business','Sports','Entertainment','Climate'], url:'https://feeds.npr.org/1001/rss.xml'},
  {id:'reuters',   name:'Reuters',       logo:'R',    bg:'#FF8000',tc:'#fff', cats:['World News','Politics','Finance','Business','Science'],                                   url:'https://feeds.reuters.com/reuters/topNews'},
  {id:'ap',        name:'AP News',       logo:'AP',   bg:'#222',   tc:'#fff', cats:['World News','Politics','Finance','Business','Science','Sports'],                          url:'https://feeds.apnews.com/rss/apf-topnews'},

  // Finance & Business
  {id:'cnbc',      name:'CNBC',          logo:'CNBC', bg:'#0F1F5C',tc:'#fff', cats:['Finance','Business'],  url:'https://www.cnbc.com/id/100003114/device/rss/rss.html'},
  {id:'bloomberg', name:'Bloomberg',     logo:'B',    bg:'#000',   tc:'#fff', cats:['Finance','Business'],  url:'https://feeds.bloomberg.com/markets/news.rss'},
  {id:'wsj',       name:'Wall St. Jrnl', logo:'WSJ',  bg:'#0B2B5E',tc:'#fff', cats:['Finance','Business'],  url:'https://feeds.a.dj.com/rss/RSSMarketsMain.xml'},
  {id:'ft',        name:'Financial Times',logo:'FT',  bg:'#FCC000',tc:'#000', cats:['Finance','Business'],  url:'https://www.ft.com/rss/home'},
  {id:'economist', name:'The Economist', logo:'TE',   bg:'#E3120B',tc:'#fff', cats:['Finance','Business','World News','Politics'], url:'https://www.economist.com/finance-and-economics/rss.xml'},

  // Technology
  {id:'ars',       name:'Ars Technica',  logo:'Ars',  bg:'#F60',   tc:'#fff', cats:['Technology','Science','AI'], url:'https://feeds.arstechnica.com/arstechnica/index'},
  {id:'verge',     name:'The Verge',     logo:'V',    bg:'#FA4B2A',tc:'#fff', cats:['Technology','AI'],           url:'https://www.theverge.com/rss/index.xml'},
  {id:'wired',     name:'Wired',         logo:'WR',   bg:'#000',   tc:'#fff', cats:['Technology','AI','Science'], url:'https://www.wired.com/feed/rss'},
  {id:'techcrunch',name:'TechCrunch',    logo:'TC',   bg:'#0A8A00',tc:'#fff', cats:['Technology','AI','Business'],url:'https://techcrunch.com/feed/'},
  {id:'mit',       name:'MIT Tech Review',logo:'MIT', bg:'#A31F34',tc:'#fff', cats:['Technology','AI','Science'], url:'https://www.technologyreview.com/feed/'},

  // Science
  {id:'scidaily',  name:'Science Daily', logo:'SD',   bg:'#2166AC',tc:'#fff', cats:['Science','Health'],          url:'https://www.sciencedaily.com/rss/all.xml'},
  {id:'nature',    name:'Nature',        logo:'N',    bg:'#1B4F8A',tc:'#fff', cats:['Science','Health'],          url:'https://www.nature.com/nature.rss'},
  {id:'nasa',      name:'NASA',          logo:'NASA', bg:'#0B3D91',tc:'#fff', cats:['Science'],                   url:'https://www.nasa.gov/rss/dyn/breaking_news.rss'},

  // Sports
  {id:'espn',      name:'ESPN',          logo:'ESPN', bg:'#CC0000',tc:'#fff', cats:['Sports'],                    url:'https://www.espn.com/espn/rss/news'},
  {id:'bbcsport',  name:'BBC Sport',     logo:'BBC',  bg:'#BB1919',tc:'#fff', cats:['Sports'],                    url:'https://feeds.bbci.co.uk/sport/rss.xml'},
  {id:'skysports', name:'Sky Sports',    logo:'SKY',  bg:'#0072CE',tc:'#fff', cats:['Sports'],                    url:'https://www.skysports.com/rss/12040'},

  // Politics
  {id:'bbcpol',    name:'BBC Politics',  logo:'BBC',  bg:'#BB1919',tc:'#fff', cats:['Politics'],                  url:'https://feeds.bbci.co.uk/news/politics/rss.xml'},
  {id:'hill',      name:'The Hill',      logo:'TH',   bg:'#1A3353',tc:'#fff', cats:['Politics'],                  url:'https://thehill.com/feed/'},
  {id:'politico',  name:'Politico',      logo:'PO',   bg:'#B22222',tc:'#fff', cats:['Politics'],                  url:'https://www.politico.com/rss/politicopicks.xml'},

  // Health
  {id:'bbchealth', name:'BBC Health',    logo:'BBC',  bg:'#BB1919',tc:'#fff', cats:['Health'],                    url:'https://feeds.bbci.co.uk/news/health/rss.xml'},
  {id:'webmd',     name:'WebMD',         logo:'WMD',  bg:'#CF2626',tc:'#fff', cats:['Health'],                    url:'https://rssfeeds.webmd.com/rss/rss.aspx?RSSSource=RSS_PUBLIC'},
  {id:'nih',       name:'NIH News',      logo:'NIH',  bg:'#1A4F8A',tc:'#fff', cats:['Health','Science'],          url:'https://www.nih.gov/news-events/news-releases/feed'},

  // Entertainment
  {id:'variety',   name:'Variety',       logo:'Va',   bg:'#8B0000',tc:'#fff', cats:['Entertainment'],             url:'https://variety.com/feed/'},
  {id:'hollyrep',  name:'Hollywood Rep.', logo:'HR',  bg:'#1C1C1C',tc:'#fff', cats:['Entertainment'],             url:'https://www.hollywoodreporter.com/feed/'},

  // Climate
  {id:'bbcenv',    name:'BBC Environment',logo:'BBC', bg:'#BB1919',tc:'#fff', cats:['Climate','Science'],         url:'https://feeds.bbci.co.uk/news/science_and_environment/rss.xml'},
  {id:'guardian',  name:'The Guardian',  logo:'GU',   bg:'#052962',tc:'#fff', cats:['Climate','World News','Politics','Science'], url:'https://www.theguardian.com/environment/rss'},
];

const COLORS=[
  {bg:'#f0edff',text:'#3d2fa0',dot:'#7c6fe0',dbg:'#1e1a3a',dt:'#b8b0ff'},
  {bg:'#e6f7f1',text:'#0d5c3a',dot:'#22a06b',dbg:'#0d2a1e',dt:'#6ddbaa'},
  {bg:'#fff4e5',text:'#7a3d00',dot:'#e07c2a',dbg:'#2a1a00',dt:'#fdb96a'},
  {bg:'#fce8f0',text:'#7a1040',dot:'#d4537e',dbg:'#2a0d1a',dt:'#f0a0c0'},
  {bg:'#e5f4ff',text:'#0a3d6b',dot:'#378add',dbg:'#0a1e35',dt:'#80c0ff'},
  {bg:'#edf7e6',text:'#2a5c10',dot:'#5a9e2f',dbg:'#132510',dt:'#90d060'},
  {bg:'#fff0e5',text:'#7a2e00',dot:'#d96329',dbg:'#2a1200',dt:'#ffa060'},
  {bg:'#f5f0ff',text:'#4a1080',dot:'#9060d0',dbg:'#1e0f30',dt:'#c090ff'},
];

// Default enabled sources
const DEFAULT_SOURCES = ['bbc','npr','cnbc','wsj','ars','verge','scidaily','espn','bbcpol','bbchealth','bbcenv'];

let topics      = loadTopics();
let adding      = false;
let loadingSet  = new Set();
let searchQuery = '';
let enabledSources = loadEnabledSources();
// temp selection in drawer (uncommitted)
let drawerSelection = new Set(enabledSources);

function loadTopics(){try{const s=localStorage.getItem(KEY_TOPICS);if(s)return JSON.parse(s);}catch{}return['Technology','World News','Finance','Science'];}
function saveTopics(){try{localStorage.setItem(KEY_TOPICS,JSON.stringify(topics));}catch{}}
function loadEnabledSources(){try{const s=localStorage.getItem(KEY_SOURCES);if(s)return new Set(JSON.parse(s));}catch{}return new Set(DEFAULT_SOURCES);}
function saveEnabledSources(){try{localStorage.setItem(KEY_SOURCES,JSON.stringify([...enabledSources]));}catch{}}
function col(i){return COLORS[i%COLORS.length];}
function isDark(){return document.documentElement.getAttribute('data-theme')==='dark';}

// ── Theme ───────────────────────────────────────────────────────────────────
(function(){
  const saved=localStorage.getItem(KEY_THEME)||'light';
  document.documentElement.setAttribute('data-theme',saved);
  document.getElementById('dark-btn').textContent=saved==='dark'?'☀️':'🌙';
  document.getElementById('theme-color-meta').content=saved==='dark'?'#131313':'#faf9f6';
})();
document.getElementById('dark-btn').addEventListener('click',()=>{
  const next=isDark()?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  document.getElementById('dark-btn').textContent=next==='dark'?'☀️':'🌙';
  document.getElementById('theme-color-meta').content=next==='dark'?'#131313':'#faf9f6';
  try{localStorage.setItem(KEY_THEME,next);}catch{}
  renderTopics();renderDrawer();
});

// ── Helpers ─────────────────────────────────────────────────────────────────
function stripTags(s){
  return(s||'').replace(/<!\[CDATA\[/g,'').replace(/\]\]>/g,'')
    .replace(/<[^>]*>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<')
    .replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#039;/g,"'")
    .replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim();
}
function timeAgo(str){
  if(!str)return'';const d=new Date(str),diff=Math.floor((Date.now()-d)/1000);
  if(isNaN(diff)||diff<0)return'';
  if(diff<60)return'just now';if(diff<3600)return Math.floor(diff/60)+'m ago';
  if(diff<86400)return Math.floor(diff/3600)+'h ago';return Math.floor(diff/86400)+'d ago';
}
function safeAttr(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hl(text,q){if(!q)return text;return text.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');}

// ── Proxy fetch ─────────────────────────────────────────────────────────────
async function proxyFetch(feedUrl){
  let lastErr;
  for(const make of PROXIES){
    try{
      const purl=make(feedUrl);
      const res=await fetch(purl,{signal:AbortSignal.timeout(10000)});
      if(!res.ok)throw new Error('HTTP '+res.status);
      if(purl.includes('allorigins')){
        const j=await res.json();
        if(j&&j.contents)return j.contents;
        throw new Error('empty');
      }
      return await res.text();
    }catch(e){lastErr=e;}
  }
  throw lastErr||new Error('all proxies failed');
}

function parseXml(xml,feedUrl){
  const doc=new DOMParser().parseFromString(xml,'text/xml');
  if(doc.querySelector('parsererror'))throw new Error('parse error');
  const items=[...doc.querySelectorAll('item,entry')];
  const channelTitle=
    doc.querySelector('channel>title')?.textContent||
    doc.querySelector('feed>title')?.textContent||
    new URL(feedUrl).hostname.replace('www.','');
  return items.slice(0,5).map(item=>{
    const title=stripTags(item.querySelector('title')?.textContent||'');
    const descEl=item.querySelector('description,summary,content\\:encoded,content');
    const summary=stripTags(descEl?.textContent||descEl?.innerHTML||'');
    const trimmed=summary.length>200?summary.slice(0,200)+'…':summary;
    const linkEl=item.querySelector('link');
    const link=linkEl?.getAttribute('href')||stripTags(linkEl?.textContent||'')||stripTags(item.querySelector('guid')?.textContent||'')||'#';
    const pubDate=item.querySelector('pubDate')?.textContent||item.querySelector('published')?.textContent||item.querySelector('updated')?.textContent||'';
    return{title,summary:trimmed,link,pubDate,source:channelTitle};
  }).filter(x=>x.title);
}

async function fetchFeed(src){
  const xml=await proxyFetch(src.url);
  const items=parseXml(xml,src.url);
  // Override source name with our branded name
  return items.map(x=>({...x,source:src.name}));
}

// Get active sources for a topic
function sourcesForTopic(topic){
  return ALL_SOURCES.filter(s=>s.cats.includes(topic)&&enabledSources.has(s.id));
}

async function fetchTopic(topic){
  const srcs=sourcesForTopic(topic);
  if(!srcs.length)return[];
  const results=await Promise.allSettled(srcs.map(fetchFeed));
  const all=results.flatMap(r=>r.status==='fulfilled'?r.value:[]);
  const seen=new Set();
  return all.filter(x=>{if(!x.title||seen.has(x.title))return false;seen.add(x.title);return true;}).slice(0,6);
}

// ── Sources drawer ───────────────────────────────────────────────────────────
function updateBadge(){
  const badge=document.getElementById('sources-badge');
  const n=enabledSources.size;
  badge.style.display=n>0?'flex':'none';
  badge.textContent=n;
}

function openDrawer(){
  drawerSelection=new Set(enabledSources);
  renderDrawer();
  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer(){
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

document.getElementById('sources-btn').addEventListener('click',openDrawer);
document.getElementById('drawer-overlay').addEventListener('click',closeDrawer);
document.getElementById('drawer-close').addEventListener('click',closeDrawer);
document.getElementById('drawer-apply').addEventListener('click',()=>{
  enabledSources=new Set(drawerSelection);
  saveEnabledSources();
  updateBadge();
  closeDrawer();
  refreshAll();
});

function renderDrawer(){
  const body=document.getElementById('drawer-body');
  // Group sources by broad category for display
  const cats=[
    {label:'General & World',ids:['bbc','npr','reuters','ap','guardian']},
    {label:'Finance & Business',ids:['cnbc','bloomberg','wsj','ft','economist']},
    {label:'Technology & AI',ids:['ars','verge','wired','techcrunch','mit']},
    {label:'Science & Health',ids:['scidaily','nature','nasa','webmd','nih']},
    {label:'Sports',ids:['espn','bbcsport','skysports']},
    {label:'Politics',ids:['bbcpol','hill','politico']},
    {label:'Entertainment',ids:['variety','hollyrep']},
  ];
  const d=isDark();
  body.innerHTML=cats.map(cat=>{
    const srcs=cat.ids.map(id=>ALL_SOURCES.find(s=>s.id===id)).filter(Boolean);
    return`<div class="source-category">
      <div class="source-cat-label">${cat.label}</div>
      <div class="source-grid">
        ${srcs.map(s=>{
          const on=drawerSelection.has(s.id);
          const cardBg=on?(d?'#252525':'#fafafa'):'';
          const borderColor=on?(d?s.bg:'#ccc'):''
          return`<div class="source-card${on?' on':''}" data-id="${s.id}" style="${cardBg?'background:'+cardBg+';':''} ${borderColor?'border-color:'+borderColor+';':''}">
            <div class="source-logo" style="background:${s.bg};color:${s.tc}">${s.logo}</div>
            <div class="source-info">
              <div class="source-name">${s.name}</div>
            </div>
            <div class="source-check">${on?'✓':''}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  body.querySelectorAll('.source-card').forEach(card=>{
    card.addEventListener('click',()=>{
      const id=card.dataset.id;
      if(drawerSelection.has(id))drawerSelection.delete(id);
      else drawerSelection.add(id);
      renderDrawer();
    });
  });
}

// ── Search ───────────────────────────────────────────────────────────────────
const searchBar=document.getElementById('search-bar');
const searchInput=document.getElementById('search-input');
const searchClear=document.getElementById('search-clear');
const searchInfo=document.getElementById('search-info');
const noResults=document.getElementById('no-results');

document.getElementById('search-btn').addEventListener('click',()=>{
  const open=!searchBar.classList.contains('open');
  searchBar.classList.toggle('open',open);
  if(open)searchInput.focus();else resetSearch();
});
searchInput.addEventListener('input',()=>{
  searchQuery=searchInput.value.trim();
  searchClear.classList.toggle('show',searchQuery.length>0);
  applySearch();
});
searchClear.addEventListener('click',()=>{searchInput.value='';searchQuery='';searchClear.classList.remove('show');applySearch();searchInput.focus();});
function resetSearch(){searchInput.value='';searchQuery='';searchClear.classList.remove('show');applySearch();}
function applySearch(){
  const q=searchQuery.toLowerCase();let total=0;
  topics.forEach(topic=>{
    const sec=document.getElementById('sec-'+topic);if(!sec)return;
    let vis=0;
    sec.querySelectorAll('.story-card').forEach(card=>{
      const h=card.dataset.h||'',s=card.dataset.s||'',src=card.dataset.src||'';
      const match=!q||[h,s,src].some(x=>x.toLowerCase().includes(q));
      card.classList.toggle('hidden',!match);
      if(match){vis++;total++;
        const hEl=card.querySelector('.story-headline');const sEl=card.querySelector('.story-summary');
        if(hEl)hEl.innerHTML=hl(h,searchQuery);if(sEl&&s)sEl.innerHTML=hl(s,searchQuery);
      }
    });
    sec.classList.toggle('hidden',q.length>0&&vis===0);
  });
  if(q){
    searchInfo.textContent=total+' result'+(total!==1?'s':'')+' for "'+searchQuery+'"';
    noResults.classList.toggle('show',total===0);
    document.getElementById('no-results-msg').textContent='No stories match "'+searchQuery+'"';
  }else{
    searchInfo.textContent='';noResults.classList.remove('show');
    topics.forEach(t=>{document.getElementById('sec-'+t)?.classList.remove('hidden');});
  }
}

// ── Topics bar ────────────────────────────────────────────────────────────────
function renderTopics(){
  const row=document.getElementById('topics-row');row.innerHTML='';
  const d=isDark();
  topics.forEach((t,i)=>{
    const c=col(i);const pill=document.createElement('span');
    pill.className='topic-pill';
    pill.style.cssText=`background:${d?c.dbg:c.bg};color:${d?c.dt:c.text};border-color:${d?c.dbg:c.bg}`;
    pill.innerHTML=`<span class="topic-dot" style="background:${c.dot}"></span>${t}<span class="topic-remove">×</span>`;
    pill.querySelector('.topic-remove').addEventListener('click',e=>{
      e.stopPropagation();topics=topics.filter(x=>x!==t);saveTopics();renderTopics();
      document.getElementById('sec-'+t)?.remove();
    });
    row.appendChild(pill);
  });
  if(adding){
    const wrap=document.createElement('span');wrap.className='add-input-wrap';
    wrap.innerHTML='<input id="ti" placeholder="e.g. Climate" maxlength="30"><button id="tok">Add</button><button id="tcancel">Cancel</button>';
    row.appendChild(wrap);
    const inp=wrap.querySelector('#ti');inp.focus();
    const doAdd=()=>{
      const v=inp.value.trim();
      if(v&&!topics.includes(v)){
        topics.push(v);saveTopics();adding=false;renderTopics();
        document.getElementById('stories-container').appendChild(makeSkeleton(v,topics.length-1));
        loadTopic(v,topics.length-1);
      }else{adding=false;renderTopics();}
    };
    wrap.querySelector('#tok').addEventListener('click',doAdd);
    wrap.querySelector('#tcancel').addEventListener('click',()=>{adding=false;renderTopics();});
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')doAdd();if(e.key==='Escape'){adding=false;renderTopics();}});
  }else{
    const a=document.createElement('span');a.className='add-pill';a.textContent='+ Add topic';
    a.addEventListener('click',()=>{adding=true;renderTopics();});row.appendChild(a);
  }
}

// ── Feed rendering ────────────────────────────────────────────────────────────
function makeSkeleton(topic,i){
  const c=col(i);const div=document.createElement('div');
  div.className='topic-section';div.id='sec-'+topic;
  div.innerHTML=`<div class="section-header"><span class="section-dot" style="background:${c.dot}"></span><span class="section-title">${topic}</span><span class="section-line"></span></div>`+
    [1,2,3].map(()=>`<div class="skeleton-card"><div class="skeleton" style="height:14px;width:70%;margin-bottom:9px"></div><div class="skeleton" style="height:11px;width:90%;margin-bottom:5px"></div><div class="skeleton" style="height:11px;width:58%"></div></div>`).join('');
  return div;
}

function renderStories(topic,i,stories,errMsg){
  const sec=document.getElementById('sec-'+topic);if(!sec)return;
  const c=col(i);const d=isDark();
  const tagBg=d?c.dbg:c.bg;const tagTx=d?c.dt:c.text;
  let html='';
  if(!stories||!stories.length){
    html=`<div class="no-stories">No stories found — check your sources or try refreshing.</div>`;
    if(errMsg)html+=`<div class="error-note">${errMsg}</div>`;
  }else{
    stories.forEach(s=>{
      const ta=timeAgo(s.pubDate);
      html+=`<a class="story-card" href="${safeAttr(s.link)}" target="_blank" rel="noopener noreferrer"
        data-h="${safeAttr(s.title)}" data-s="${safeAttr(s.summary)}" data-src="${safeAttr(s.source)}">
        <div class="story-top">
          <div class="story-headline">${s.title}</div>
          <span class="story-tag" style="background:${tagBg};color:${tagTx}">${topic}</span>
        </div>
        ${s.summary?`<div class="story-summary">${s.summary}</div>`:''}
        <div class="story-meta">
          <span>${s.source}</span>${ta?`<span>·</span><span>${ta}</span>`:''}
          <span class="story-meta-arrow">↗</span>
        </div>
      </a>`;
    });
  }
  sec.innerHTML=`<div class="section-header"><span class="section-dot" style="background:${c.dot}"></span><span class="section-title">${topic}</span><span class="section-line"></span></div>${html}`;
  if(searchQuery)applySearch();
}

// ── Load ──────────────────────────────────────────────────────────────────────
async function loadTopic(topic,i){
  loadingSet.add(topic);updateBtn();
  try{renderStories(topic,i,await fetchTopic(topic));}
  catch(e){console.error(topic,e);renderStories(topic,i,[],e.message);}
  loadingSet.delete(topic);updateBtn();
}
function updateBtn(){
  const btn=document.getElementById('refresh-btn');const icon=document.getElementById('refresh-icon');
  if(loadingSet.size>0){btn.classList.add('loading');icon.className='spin';icon.textContent='';}
  else{btn.classList.remove('loading');icon.className='';icon.textContent='↻';}
}
function refreshAll(){
  if(loadingSet.size>0)return;
  resetSearch();
  const c=document.getElementById('stories-container');c.innerHTML='';
  topics.forEach((t,i)=>c.appendChild(makeSkeleton(t,i)));
  topics.forEach((t,i)=>loadTopic(t,i));
}
document.getElementById('refresh-btn').addEventListener('click',refreshAll);

// ── Install banner ────────────────────────────────────────────────────────────
(function(){
  if(localStorage.getItem(KEY_BANNER))return;
  if(!/iphone|ipad|ipod/i.test(navigator.userAgent)||window.navigator.standalone)return;
  document.getElementById('install-hint').innerHTML=`<div class="install-banner"><span style="font-size:20px;flex-shrink:0;margin-top:1px">📲</span><span>Add to home screen: tap <strong>Share</strong> → <strong>Add to Home Screen</strong> in Safari.</span><span class="install-banner-close" onclick="this.closest('.install-banner').remove();localStorage.setItem('${KEY_BANNER}','1')">×</span></div>`;
})();

// ── Boot ──────────────────────────────────────────────────────────────────────
document.getElementById('date-label').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
updateBadge();
renderTopics();
const container=document.getElementById('stories-container');
topics.forEach((t,i)=>container.appendChild(makeSkeleton(t,i)));
topics.forEach((t,i)=>loadTopic(t,i));
</script>
