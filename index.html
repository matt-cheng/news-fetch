<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daily Digest">
<meta name="theme-color" content="#faf9f6" id="theme-color-meta">
<title>Daily Digest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root, [data-theme="light"] {
    --bg: #faf9f6;
    --surface: #ffffff;
    --surface2: #f5f4f1;
    --border: #ebebeb;
    --text: #111111;
    --text2: #444444;
    --muted: #888888;
    --faint: #cccccc;
    --search-bg: #f0eeea;
    --skeleton: #efefef;
    --header-bg: rgba(250,249,246,0.93);
    --radius: 14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  [data-theme="dark"] {
    --bg: #131313;
    --surface: #1e1e1e;
    --surface2: #252525;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --text2: #bbbbbb;
    --muted: #777777;
    --faint: #444444;
    --search-bg: #252525;
    --skeleton: #2a2a2a;
    --header-bg: rgba(19,19,19,0.93);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); transition: background 0.2s, color 0.2s; }

  /* Header */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--header-bg);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--border);
    padding: calc(var(--safe-top) + 14px) 20px 0;
    transition: background 0.2s, border-color 0.2s;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; max-width: 680px; margin: 0 auto; padding-bottom: 12px; }
  .header-left h1 { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; line-height: 1; color: var(--text); transition: color 0.2s; }
  .header-left .date { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .header-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .icon-btn {
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface);
    cursor: pointer; font-size: 16px; line-height: 1;
    transition: background 0.15s, border-color 0.2s;
  }
  .icon-btn:active { background: var(--surface2); }

  .refresh-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--text);
    cursor: pointer; flex-shrink: 0;
    transition: background 0.15s, border-color 0.2s, color 0.2s;
  }
  .refresh-btn:active { background: var(--surface2); }
  .refresh-btn.loading { color: var(--muted); }

  /* Search */
  .search-bar { max-width: 680px; margin: 0 auto; padding: 0 0 12px; display: none; }
  .search-bar.open { display: block; }
  .search-inner {
    display: flex; align-items: center; gap: 8px;
    background: var(--search-bg); border-radius: 12px; padding: 9px 14px;
    transition: background 0.2s;
  }
  .search-icon { color: var(--muted); font-size: 15px; flex-shrink: 0; }
  .search-input {
    flex: 1; background: none; border: none; outline: none;
    font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); min-width: 0;
    transition: color 0.2s;
  }
  .search-input::placeholder { color: var(--faint); }
  .search-clear { font-size: 18px; color: var(--faint); cursor: pointer; line-height: 1; visibility: hidden; }
  .search-clear.show { visibility: visible; }

  /* Topics bar */
  .topics-bar { background: var(--bg); border-bottom: 1px solid var(--border); padding: 12px 20px; transition: background 0.2s, border-color 0.2s; }
  .topics-bar-inner { max-width: 680px; margin: 0 auto; }
  .topics-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--faint); margin-bottom: 9px; }
  .topics-scroll { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
  .topic-pill { display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px; border-radius: 20px; font-size: 12.5px; font-weight: 500; cursor: pointer; border: 1px solid transparent; user-select: none; -webkit-user-select: none; transition: opacity 0.15s; }
  .topic-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .topic-remove { font-size: 14px; opacity: 0.4; margin-left: 1px; }
  .add-pill { display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px; border-radius: 20px; font-size: 12.5px; border: 1px dashed var(--faint); color: var(--muted); background: transparent; cursor: pointer; }
  .add-input-wrap { display: inline-flex; align-items: center; gap: 6px; }
  .add-input-wrap input { font-size: 13px; padding: 5px 11px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; width: 130px; transition: background 0.2s, border-color 0.2s, color 0.2s; }
  .add-input-wrap button { font-size: 12px; padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s, color 0.2s; }

  /* Feed */
  .feed { max-width: 680px; margin: 0 auto; padding: 20px 20px calc(var(--safe-bottom) + 40px); }
  .topic-section { margin-bottom: 28px; }
  .topic-section.hidden { display: none; }
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .section-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
  .section-line { flex: 1; height: 1px; background: var(--border); transition: background 0.2s; }

  /* Cards */
  .story-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 9px; text-decoration: none; display: block; color: inherit; transition: border-color 0.15s, transform 0.1s, background 0.2s; -webkit-touch-callout: none; }
  .story-card:active { transform: scale(0.99); border-color: var(--faint); }
  .story-card.hidden { display: none; }
  .story-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
  .story-headline { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.45; flex: 1; transition: color 0.2s; }
  .story-tag { font-size: 10px; font-weight: 600; letter-spacing: 0.03em; padding: 3px 8px; border-radius: 7px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
  .story-summary { font-size: 12.5px; color: var(--text2); line-height: 1.6; margin-bottom: 8px; transition: color 0.2s; }
  .story-meta { font-size: 11px; color: var(--faint); display: flex; align-items: center; gap: 5px; }
  .story-meta-arrow { margin-left: auto; font-size: 11px; }
  mark { background: #ffe566; color: #111; border-radius: 2px; padding: 0 1px; }
  [data-theme="dark"] mark { background: #7a5e00; color: #ffe599; }

  /* Skeleton */
  .skeleton { background: var(--skeleton); border-radius: 6px; animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .skeleton-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 9px; transition: background 0.2s, border-color 0.2s; }
  .no-stories { font-size: 13px; color: var(--faint); padding: 8px 0 4px; }

  /* Search info bar */
  .search-info { font-size: 12px; color: var(--muted); margin-bottom: 4px; padding-top: 4px; min-height: 24px; }

  /* No results */
  .no-results { display: none; text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
  .no-results.show { display: block; }
  .no-results-icon { font-size: 32px; margin-bottom: 10px; }

  /* Install banner */
  .install-banner { margin: 0 0 20px; background: #fff8ee; border: 1px solid #f5d78e; border-radius: var(--radius); padding: 13px 16px; font-size: 13px; color: #7a5000; line-height: 1.5; display: flex; align-items: flex-start; gap: 10px; }
  [data-theme="dark"] .install-banner { background: #2a1f00; border-color: #6a5000; color: #f0c060; }
  .install-banner-close { margin-left: auto; cursor: pointer; opacity: 0.5; font-size: 18px; line-height: 1; flex-shrink: 0; }

  /* Spinner */
  .spin { display: inline-block; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--border); border-top-color: var(--muted); animation: spin 0.7s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-left">
      <h1>Daily Digest</h1>
      <div class="date" id="date-label"></div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="search-btn" title="Search" aria-label="Search">🔍</button>
      <button class="icon-btn" id="dark-btn" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
      <button class="refresh-btn" id="refresh-btn"><span id="refresh-icon">↻</span> Refresh</button>
    </div>
  </div>
  <div class="search-bar" id="search-bar">
    <div class="search-inner">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search-input" type="search" placeholder="Search headlines…" autocomplete="off" autocorrect="off" spellcheck="false">
      <span class="search-clear" id="search-clear">×</span>
    </div>
  </div>
</div>

<div class="topics-bar">
  <div class="topics-bar-inner">
    <div class="topics-label">Your topics</div>
    <div class="topics-scroll" id="topics-row"></div>
  </div>
</div>

<div class="feed">
  <div id="install-hint"></div>
  <div class="search-info" id="search-info"></div>
  <div class="no-results" id="no-results"><div class="no-results-icon">🔍</div><div id="no-results-msg"></div></div>
  <div id="stories-container"></div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const RSS2JSON      = 'https://api.rss2json.com/v1/api.json';
const KEY_TOPICS    = 'digest-topics-v2';
const KEY_BANNER    = 'digest-banner-dismissed';
const KEY_THEME     = 'digest-theme-v1';

const COLORS = [
  {bg:'#f0edff',text:'#3d2fa0',dot:'#7c6fe0',dbg:'#1e1a3a',dt:'#b8b0ff'},
  {bg:'#e6f7f1',text:'#0d5c3a',dot:'#22a06b',dbg:'#0d2a1e',dt:'#6ddbaa'},
  {bg:'#fff4e5',text:'#7a3d00',dot:'#e07c2a',dbg:'#2a1a00',dt:'#fdb96a'},
  {bg:'#fce8f0',text:'#7a1040',dot:'#d4537e',dbg:'#2a0d1a',dt:'#f0a0c0'},
  {bg:'#e5f4ff',text:'#0a3d6b',dot:'#378add',dbg:'#0a1e35',dt:'#80c0ff'},
  {bg:'#edf7e6',text:'#2a5c10',dot:'#5a9e2f',dbg:'#132510',dt:'#90d060'},
  {bg:'#fff0e5',text:'#7a2e00',dot:'#d96329',dbg:'#2a1200',dt:'#ffa060'},
  {bg:'#f5f0ff',text:'#4a1080',dot:'#9060d0',dbg:'#1e0f30',dt:'#c090ff'},
];

const FEEDS = {
  'Technology':    ['https://feeds.arstechnica.com/arstechnica/technology-lab','https://www.theverge.com/rss/index.xml'],
  'World News':    ['https://feeds.bbci.co.uk/news/world/rss.xml','https://rss.nytimes.com/services/xml/rss/nyt/World.xml'],
  'Finance':       ['https://feeds.a.dj.com/rss/RSSMarketsMain.xml','https://www.cnbc.com/id/10000664/device/rss/rss.html'],
  'Science':       ['https://www.sciencedaily.com/rss/all.xml','https://feeds.arstechnica.com/arstechnica/science'],
  'Politics':      ['https://feeds.bbci.co.uk/news/politics/rss.xml','https://rss.nytimes.com/services/xml/rss/nyt/Politics.xml'],
  'Sports':        ['https://feeds.bbci.co.uk/sport/rss.xml','https://www.espn.com/espn/rss/news'],
  'Health':        ['https://feeds.bbci.co.uk/news/health/rss.xml','https://rss.nytimes.com/services/xml/rss/nyt/Health.xml'],
  'AI':            ['https://feeds.arstechnica.com/arstechnica/technology-lab','https://www.theverge.com/rss/index.xml'],
  'Business':      ['https://feeds.bbci.co.uk/news/business/rss.xml','https://feeds.a.dj.com/rss/RSSBusiness.xml'],
  'Climate':       ['https://rss.nytimes.com/services/xml/rss/nyt/Climate.xml','https://feeds.bbci.co.uk/news/science_and_environment/rss.xml'],
  'Entertainment': ['https://rss.nytimes.com/services/xml/rss/nyt/Arts.xml','https://feeds.bbci.co.uk/news/entertainment_and_arts/rss.xml'],
};
const FALLBACK = ['https://feeds.bbci.co.uk/news/rss.xml','https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml'];

// ── State ──────────────────────────────────────────────────────────────────
let topics       = loadTopics();
let adding       = false;
let loadingSet   = new Set();
let searchQuery  = '';

function loadTopics() {
  try { const s = localStorage.getItem(KEY_TOPICS); if (s) return JSON.parse(s); } catch {}
  return ['Technology','World News','Finance','Science'];
}
function saveTopics() { try { localStorage.setItem(KEY_TOPICS, JSON.stringify(topics)); } catch {} }
function col(i) { return COLORS[i % COLORS.length]; }
function dark() { return document.documentElement.getAttribute('data-theme') === 'dark'; }

// ── Theme ──────────────────────────────────────────────────────────────────
(function initTheme() {
  const saved = localStorage.getItem(KEY_THEME) || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('dark-btn').textContent = saved === 'dark' ? '☀️' : '🌙';
  document.getElementById('theme-color-meta').content = saved === 'dark' ? '#131313' : '#faf9f6';
})();

document.getElementById('dark-btn').addEventListener('click', () => {
  const next = dark() ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('dark-btn').textContent = next === 'dark' ? '☀️' : '🌙';
  document.getElementById('theme-color-meta').content = next === 'dark' ? '#131313' : '#faf9f6';
  try { localStorage.setItem(KEY_THEME, next); } catch {}
  renderTopics(); // re-color pills
});

// ── Helpers ────────────────────────────────────────────────────────────────
function strip(s) {
  return (s||'').replace(/<[^>]*>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#039;/g,"'").replace(/\s+/g,' ').trim();
}
function ago(str) {
  if (!str) return '';
  const d = new Date(str), diff = Math.floor((Date.now()-d)/1000);
  if (isNaN(diff)||diff<0) return '';
  if (diff<60) return 'just now';
  if (diff<3600) return Math.floor(diff/60)+'m ago';
  if (diff<86400) return Math.floor(diff/3600)+'h ago';
  return Math.floor(diff/86400)+'d ago';
}
function esc(s) { return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function hi(text, q) {
  if (!q) return text;
  return text.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
}

// ── Search ─────────────────────────────────────────────────────────────────
const searchBar   = document.getElementById('search-bar');
const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');
const searchInfo  = document.getElementById('search-info');
const noResults   = document.getElementById('no-results');

document.getElementById('search-btn').addEventListener('click', () => {
  const open = !searchBar.classList.contains('open');
  searchBar.classList.toggle('open', open);
  if (open) { searchInput.focus(); }
  else { resetSearch(); }
});

searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value.trim();
  searchClear.classList.toggle('show', searchQuery.length > 0);
  applySearch();
});

searchClear.addEventListener('click', () => {
  searchInput.value = ''; searchQuery = '';
  searchClear.classList.remove('show');
  applySearch();
  searchInput.focus();
});

function resetSearch() {
  searchInput.value = ''; searchQuery = '';
  searchClear.classList.remove('show');
  applySearch();
}

function applySearch() {
  const q = searchQuery.toLowerCase();
  let total = 0;

  topics.forEach(topic => {
    const sec = document.getElementById('sec-' + topic);
    if (!sec) return;
    let vis = 0;
    sec.querySelectorAll('.story-card').forEach(card => {
      const h = card.dataset.h || '';
      const s = card.dataset.s || '';
      const src = card.dataset.src || '';
      const match = !q || h.toLowerCase().includes(q) || s.toLowerCase().includes(q) || src.toLowerCase().includes(q);
      card.classList.toggle('hidden', !match);
      if (match) {
        vis++; total++;
        const hEl = card.querySelector('.story-headline');
        const sEl = card.querySelector('.story-summary');
        if (hEl) hEl.innerHTML = hi(h, searchQuery);
        if (sEl && s) sEl.innerHTML = hi(s, searchQuery);
      }
    });
    sec.classList.toggle('hidden', q.length > 0 && vis === 0);
  });

  if (q) {
    searchInfo.textContent = total + ' result' + (total !== 1 ? 's' : '') + ' for "' + searchQuery + '"';
    noResults.classList.toggle('show', total === 0);
    document.getElementById('no-results-msg').textContent = 'No stories match "' + searchQuery + '"';
  } else {
    searchInfo.textContent = '';
    noResults.classList.remove('show');
    topics.forEach(t => { const s = document.getElementById('sec-'+t); if(s) s.classList.remove('hidden'); });
  }
}

// ── Fetch ──────────────────────────────────────────────────────────────────
async function fetchFeed(url) {
  const r = await fetch(RSS2JSON + '?rss_url=' + encodeURIComponent(url) + '&count=4');
  if (!r.ok) throw new Error('http ' + r.status);
  const d = await r.json();
  if (d.status !== 'ok') throw new Error('feed error');
  const feedTitle = d.feed?.title || (new URL(url).hostname.replace('www.',''));
  return d.items.map(item => ({
    title:   strip(item.title),
    summary: (() => { const s = strip(item.description); return s.length > 200 ? s.slice(0,200)+'…' : s; })(),
    link:    item.link || item.guid || '#',
    pubDate: item.pubDate,
    source:  feedTitle,
  }));
}

async function fetchTopic(topic) {
  const urls = FEEDS[topic] || FALLBACK;
  const results = await Promise.allSettled(urls.map(fetchFeed));
  const all = results.flatMap(r => r.status === 'fulfilled' ? r.value : []);
  const seen = new Set();
  return all.filter(x => { if (!x.title || seen.has(x.title)) return false; seen.add(x.title); return true; }).slice(0, 4);
}

// ── Render topics bar ──────────────────────────────────────────────────────
function renderTopics() {
  const row = document.getElementById('topics-row');
  row.innerHTML = '';
  const d = dark();
  topics.forEach((t, i) => {
    const c = col(i);
    const pill = document.createElement('span');
    pill.className = 'topic-pill';
    pill.style.cssText = `background:${d?c.dbg:c.bg};color:${d?c.dt:c.text};border-color:${d?c.dbg:c.bg}`;
    pill.innerHTML = `<span class="topic-dot" style="background:${c.dot}"></span>${t}<span class="topic-remove">×</span>`;
    pill.querySelector('.topic-remove').addEventListener('click', e => {
      e.stopPropagation();
      topics = topics.filter(x => x !== t);
      saveTopics();
      renderTopics();
      document.getElementById('sec-'+t)?.remove();
    });
    row.appendChild(pill);
  });

  if (adding) {
    const wrap = document.createElement('span');
    wrap.className = 'add-input-wrap';
    wrap.innerHTML = '<input id="ti" placeholder="e.g. Climate" maxlength="30"><button id="tok">Add</button><button id="tcancel">Cancel</button>';
    row.appendChild(wrap);
    const inp = wrap.querySelector('#ti'); inp.focus();
    const doAdd = () => {
      const v = inp.value.trim();
      if (v && !topics.includes(v)) {
        topics.push(v); saveTopics(); adding = false; renderTopics();
        const skel = makeSkeleton(v, topics.length - 1);
        document.getElementById('stories-container').appendChild(skel);
        loadTopic(v, topics.length - 1);
      } else { adding = false; renderTopics(); }
    };
    wrap.querySelector('#tok').addEventListener('click', doAdd);
    wrap.querySelector('#tcancel').addEventListener('click', () => { adding = false; renderTopics(); });
    inp.addEventListener('keydown', e => { if(e.key==='Enter') doAdd(); if(e.key==='Escape'){adding=false;renderTopics();} });
  } else {
    const a = document.createElement('span');
    a.className = 'add-pill'; a.textContent = '+ Add topic';
    a.addEventListener('click', () => { adding = true; renderTopics(); });
    row.appendChild(a);
  }
}

// ── Render feed ────────────────────────────────────────────────────────────
function makeSkeleton(topic, i) {
  const c = col(i);
  const div = document.createElement('div');
  div.className = 'topic-section'; div.id = 'sec-' + topic;
  div.innerHTML = `
    <div class="section-header">
      <span class="section-dot" style="background:${c.dot}"></span>
      <span class="section-title">${topic}</span>
      <span class="section-line"></span>
    </div>
    ${[1,2,3].map(()=>`<div class="skeleton-card"><div class="skeleton" style="height:14px;width:70%;margin-bottom:9px"></div><div class="skeleton" style="height:11px;width:90%;margin-bottom:5px"></div><div class="skeleton" style="height:11px;width:58%"></div></div>`).join('')}`;
  return div;
}

function renderStories(topic, i, stories) {
  const sec = document.getElementById('sec-' + topic);
  if (!sec) return;
  const c = col(i); const d = dark();
  const tagBg = d ? c.dbg : c.bg; const tagTx = d ? c.dt : c.text;
  let html = '';
  if (!stories || !stories.length) {
    html = '<div class="no-stories">No stories found — try refreshing.</div>';
  } else {
    stories.forEach(s => {
      html += `<a class="story-card" href="${esc(s.link)}" target="_blank" rel="noopener noreferrer"
        data-h="${esc(s.title)}" data-s="${esc(s.summary)}" data-src="${esc(s.source)}">
        <div class="story-top">
          <div class="story-headline">${s.title}</div>
          <span class="story-tag" style="background:${tagBg};color:${tagTx}">${topic}</span>
        </div>
        ${s.summary ? `<div class="story-summary">${s.summary}</div>` : ''}
        <div class="story-meta">
          <span>${s.source}</span>
          ${ago(s.pubDate) ? `<span>·</span><span>${ago(s.pubDate)}</span>` : ''}
          <span class="story-meta-arrow">↗</span>
        </div>
      </a>`;
    });
  }
  sec.innerHTML = `
    <div class="section-header">
      <span class="section-dot" style="background:${c.dot}"></span>
      <span class="section-title">${topic}</span>
      <span class="section-line"></span>
    </div>${html}`;
  if (searchQuery) applySearch();
}

// ── Load ───────────────────────────────────────────────────────────────────
async function loadTopic(topic, i) {
  loadingSet.add(topic); updateBtn();
  try { renderStories(topic, i, await fetchTopic(topic)); }
  catch { renderStories(topic, i, []); }
  loadingSet.delete(topic); updateBtn();
}

function updateBtn() {
  const btn = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  if (loadingSet.size > 0) {
    btn.classList.add('loading');
    icon.className = 'spin'; icon.textContent = '';
  } else {
    btn.classList.remove('loading');
    icon.className = ''; icon.textContent = '↻';
  }
}

function refreshAll() {
  if (loadingSet.size > 0) return;
  resetSearch();
  const c = document.getElementById('stories-container');
  c.innerHTML = '';
  topics.forEach((t,i) => c.appendChild(makeSkeleton(t,i)));
  topics.forEach((t,i) => loadTopic(t,i));
}

document.getElementById('refresh-btn').addEventListener('click', refreshAll);

// ── Install banner ─────────────────────────────────────────────────────────
function showBanner() {
  if (localStorage.getItem(KEY_BANNER)) return;
  if (!/iphone|ipad|ipod/i.test(navigator.userAgent) || window.navigator.standalone) return;
  document.getElementById('install-hint').innerHTML = `
    <div class="install-banner">
      <span style="font-size:20px;flex-shrink:0;margin-top:1px">📲</span>
      <span>Add to home screen: tap <strong>Share</strong> → <strong>Add to Home Screen</strong> in Safari.</span>
      <span class="install-banner-close" onclick="this.closest('.install-banner').remove();localStorage.setItem('${KEY_BANNER}','1')">×</span>
    </div>`;
}

// ── Boot ───────────────────────────────────────────────────────────────────
document.getElementById('date-label').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
renderTopics();
showBanner();
const container = document.getElementById('stories-container');
topics.forEach((t,i) => container.appendChild(makeSkeleton(t,i)));
topics.forEach((t,i) => loadTopic(t,i));
</script>
</body>
</html>
